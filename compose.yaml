name: matriuweb

services:

  # ============================
  # Aplicació Blazor
  # ============================
  web:
    build:
      context: ./src/MatriuWeb
      dockerfile: Dockerfile
    container_name: matriuweb-web
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Redis__ConnectionString: redis:6379
      Persistence__ConfigPath: /app/data/config/frame-config.json
      Persistence__BackupPath: /app/data/config/backups
      Persistence__MaxBackups: "20"
      App__Version: "0.1.12"
      App__PublicUrl: https://ct-matriuweb.sds.lab
    volumes:
      - ./data/config:/app/data/config
      - ./data/keys:/app/data/keys
      - ./logs/web:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
      - edge

  # ============================
  # Nginx (reverse proxy HTTPS)
  # ============================
  nginx:
    image: nginx:1.27-alpine
    container_name: matriuweb-nginx
    hostname: nginx-internal
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--no-check-certificate", "https://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - edge
      - internal

  # ============================
  # Redis (cache intern)
  # ============================
  redis:
    image: redis:7-alpine
    container_name: matriuweb-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 3s
      retries: 5
    expose:
      - "6379"
    networks:
      - internal

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true
