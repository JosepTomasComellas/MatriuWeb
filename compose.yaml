name: matriuweb

services:

  # ============================
  # Aplicació Blazor
  # ============================
  web:
    build:
      context: ./src/MatriuWeb
      dockerfile: Dockerfile
    container_name: matriuweb-web
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Redis__ConnectionString: redis:6379
      Persistence__ConfigPath: /app/data/config/frame-config.json
      Persistence__BackupPath: /app/data/config/backups
      Persistence__MaxBackups: "20"
      App__Version: "0.1.0"
      App__PublicUrl: https://tuteapps.ddns.net:4444
    volumes:
      - ./data/config:/app/data/config
      - ./logs/web:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
      - edge

  # ============================
  # Nginx (reverse proxy HTTPS)
  # ============================
  nginx:
    image: nginx:1.27-alpine
    container_name: matriuweb-nginx
    hostname: nginx-internal
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "4444:4444"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--no-check-certificate", "https://localhost:4444/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - edge
      - internal

  # ============================
  # Redis (cache intern)
  # ============================
  redis:
    image: redis:7-alpine
    container_name: matriuweb-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ============================
  # Alertmanager
  # ============================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: matriuweb-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./data/alertmanager:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ============================
  # Prometheus
  # ============================
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: matriuweb-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - ./data/prometheus:/prometheus
    depends_on:
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ============================
  # Grafana
  # ============================
  grafana:
    image: grafana/grafana:11.1.4
    container_name: matriuweb-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: none
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:4444/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ============================
  # node_exporter (host/LXC)
  # ============================
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: matriuweb-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker|snap)($|/)"
    pid: host
    volumes:
      - "/:/host:ro,rslave"
    networks:
      - internal

  # ============================
  # cAdvisor (contenidors Docker)
  # ============================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: matriuweb-cadvisor
    restart: unless-stopped
    privileged: true
    command:
      - "--docker_only=true"
      - "--store_container_labels=false"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - internal

  # ============================
  # nginx-exporter (mètriques Nginx via stub_status)
  # Requereix activar stub_status a nginx.conf (vegeu comentari al conf.d)
  # ============================
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: matriuweb-nginx-exporter
    restart: unless-stopped
    command:
      - "--nginx.scrape-uri=http://nginx-internal:8081/stub_status"
    depends_on:
      - nginx
    networks:
      - internal

  # ============================
  # redis-exporter
  # ============================
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: matriuweb-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true
