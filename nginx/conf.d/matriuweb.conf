# =============================================
# MatriuWeb — Nginx
# Escolta: 4444 HTTPS
# Host públic: tuteapps.ddns.net
# =============================================

# Rate limiting (per IP)
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=config:10m  rate=5r/s;

server {
    listen 4444 ssl;
    server_name tuteapps.ddns.net;

    # ------------------------------------
    # SSL / TLS
    # ------------------------------------
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ------------------------------------
    # Headers de seguretat
    # ------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    # X-Frame-Options no s'afegeix globalment per permetre embedding de Grafana

    # ------------------------------------
    # Gzip
    # ------------------------------------
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    5;
    gzip_min_length    1024;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml image/svg+xml;

    client_max_body_size 10m;

    # ------------------------------------
    # Dashboard principal
    # ------------------------------------
    location / {
        limit_req zone=general burst=60 nodelay;

        proxy_pass         http://web:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host:$server_port;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSockets per a Blazor SignalR
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout  3600;
        proxy_send_timeout  3600;
        proxy_buffering     off;
    }

    # ------------------------------------
    # /config — protecció addicional
    # Descomenta basic_auth per activar-la.
    # Genera .htpasswd amb:
    #   scripts/nginx-create-htpasswd.sh admin SecretPassword
    # ------------------------------------
    location /config {
        limit_req zone=config burst=10 nodelay;

        # basic auth (opcional):
        # auth_basic           "Configuració MatriuWeb";
        # auth_basic_user_file /etc/nginx/certs/.htpasswd;

        # Restricció IP (opcional, alternativa a basic auth):
        # allow 192.168.1.0/24;
        # deny  all;

        proxy_pass         http://web:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host:$server_port;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 3600;
        proxy_buffering    off;
    }

    # ------------------------------------
    # /grafana/ — proxy intern
    # Grafana no s'exposa directament a Internet.
    # ------------------------------------
    location /grafana/ {
        limit_req zone=general burst=30 nodelay;

        proxy_pass         http://grafana:3000/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host:$server_port;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Permet embedding de Grafana en iframes (MatriuWeb ho necessita)
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "SAMEORIGIN";
    }

    # ------------------------------------
    # /health — sense rate limit estricte
    # ------------------------------------
    location /health {
        proxy_pass         http://web:8080/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }
}
