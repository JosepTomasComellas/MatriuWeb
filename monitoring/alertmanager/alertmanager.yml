global:
  resolve_timeout: 5m

# ------------------------------------
# Enrutament d'alertes
# ------------------------------------
route:
  group_by: ["alertname", "severity"]
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h
  receiver: "null"

  routes:
    - matchers:
        - severity = "critical"
      receiver: "null"
      repeat_interval: 1h

# ------------------------------------
# Receptors
# ------------------------------------
receivers:

  # Receptor null: descarta les alertes silenciosament.
  # Substitueix-lo per webhook o telegram quan vulguis notificacions.
  - name: "null"

  # ── Webhook (descomenta i omple la URL per activar) ──────────
  # - name: "webhook"
  #   webhook_configs:
  #     - url: "http://192.168.1.x:9999/alerts"
  #       send_resolved: true

  # ── Telegram (descomenta i omple les variables per activar) ──
  # Necessites un bot (@BotFather) i el chat_id del canal/grup.
  # - name: "telegram"
  #   telegram_configs:
  #     - bot_token: "TOKEN_DEL_BOT"
  #       chat_id: -1001234567890
  #       send_resolved: true
  #       message: |
  #         {{ range .Alerts }}
  #         🔴 *{{ .Annotations.summary }}*
  #         {{ .Annotations.description }}
  #         {{ end }}

# ------------------------------------
# Inhibicions: evita alertes redundants
# ------------------------------------
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname", "instance"]
